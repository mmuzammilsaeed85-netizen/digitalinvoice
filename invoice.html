<!DOCTYPE html>
<html>
<head>
  <title>Invoice</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <style>
    body { font-family: Arial; }
    .container { max-width:900px; margin:auto; }
    h2 { text-align:center; }
    table { width:100%; border-collapse:collapse; }
    th, td { border:1px solid #000; padding:10px; text-align:right; }
    th { background:#333; color:white; }
  </style>
</head>

<body onload="loadData()">

<div class="container">

<h2>KOH-E-NOOR TEXTILES</h2>

<p><b>Invoice No:</b> <span id="inv"></span></p>
<p><b>Date:</b> <span id="date"></span></p>
<p><b>Buyer:</b> <span id="buyer"></span></p>

<table>
<tr>
  <th>Description</th>
  <th>Amount</th>
  <th>Tax</th>
  <th>Total</th>
</tr>

<tr>
  <td>Product</td>
  <td id="value"></td>
  <td id="tax"></td>
  <td id="total"></td>
</tr>
</table>

<br>

<div style="text-align:center;">
  <h3>QR Code</h3>
  <div id="qrcode"></div>
</div>

<br><br>

<button onclick="window.print()">Download PDF</button>

</div>

<script>
function loadData(){

  let d = JSON.parse(localStorage.getItem("invoiceData"));

  document.getElementById("inv").innerText = d.inv;
  document.getElementById("date").innerText = d.date;
  document.getElementById("buyer").innerText = d.buyer;
  document.getElementById("value").innerText = d.value;
  document.getElementById("tax").innerText = d.tax;
  document.getElementById("total").innerText = d.total;

  let qr = `Invoice: ${d.inv}
Buyer: ${d.buyer}
Total: ${d.total}`;

  new QRCode(document.getElementById("qrcode"), {
    text: qr,
    width: 120,
    height: 120
  });
}
</script>

</body>
</html>
