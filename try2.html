
<div class="header">FBR Invoice Software</div>

<div class="container">

<div class="box">

<div class="row">
  <div class="col">
    <label>STRN</label>
    <input id="strn">
  </div>

  <div class="col">
    <label>Buyer Name</label>
    <input id="buyer">
  </div>
</div>

<div class="row">
  <div class="col">
    <label>Invoice No</label>
    <input id="invoiceNo">
  </div>

  <div class="col">
    <label>Date</label>
    <input type="date" id="date">
  </div>
</div>

</div>

<div class="box">

<label>Amount</label>
<input type="number" id="value">

<label>Sales Tax (18%)</label>
<input type="number" id="tax" readonly>

<label>Total</label>
<input type="number" id="total" readonly>

</div>
